<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <title>Windows 95 Retro</title>
    <style>
      :root {
        --teal: #008282;
        --chrome: #c3c7cb;
        --chrome-light: #ffffff;
        --chrome-dark: #868a8e;
        --ink: #000000;
        --title-from: #000080;
        --title-to: #1084d2;
      }
      * { box-sizing: border-box; margin: 0; }
      body {
        min-height: 100vh;
        background: var(--teal);
        color: var(--ink);
        font-family: Tahoma, "MS Sans Serif", Geneva, Verdana, sans-serif;
        font-size: 13px;
        display: flex; flex-direction: column;
      }
      .desktop { flex: 1; display: flex; align-items: center; justify-content: center; padding: 28px 16px 16px; }
      .bevel-out {
        background: var(--chrome);
        border-top: 2px solid var(--chrome-light); border-left: 2px solid var(--chrome-light);
        border-bottom: 2px solid #404040; border-right: 2px solid #404040;
        box-shadow: inset -1px -1px 0 var(--chrome-dark), inset 1px 1px 0 #dfdfdf;
      }
      .window { width: min(660px, 100%); padding: 3px; }
      .titlebar {
        display: flex; align-items: center; gap: 6px;
        background: linear-gradient(90deg, var(--title-from), var(--title-to));
        color: #fff; font-weight: 700; font-size: 12px;
        padding: 3px 4px 3px 6px;
      }
      .titlebar .spacer { flex: 1; }
      .tbtn {
        width: 18px; height: 16px; font-size: 10px; line-height: 1;
        display: inline-flex; align-items: center; justify-content: center;
        background: var(--chrome); color: #000; cursor: default;
        border-top: 1px solid var(--chrome-light); border-left: 1px solid var(--chrome-light);
        border-bottom: 1px solid #404040; border-right: 1px solid #404040;
      }
      .menubar { display: flex; gap: 2px; padding: 3px 4px; font-size: 12px; }
      .menubar span { padding: 2px 7px; }
      .menubar u { text-decoration: underline; }
      .content { margin: 0 4px 4px; padding: 22px 24px 20px; background: #fff; border: 2px inset #fff; }
      .content h1 { font-size: 26px; letter-spacing: -.5px; margin-bottom: 4px; }
      .content h1 .cursor { display: inline-block; width: 12px; height: 22px; background: #000; vertical-align: -3px; animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .content p { line-height: 1.5; margin-top: 10px; }
      .field { margin-top: 14px; padding: 12px; background: var(--chrome); border: 2px inset #fff; }
      .field label { display: flex; gap: 8px; align-items: flex-start; padding: 3px 0; }
      .field input { margin-top: 2px; }
      .row { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
      .btn {
        padding: 7px 18px; font: inherit; font-weight: 700; cursor: default;
        background: var(--chrome); color: #000;
        border-top: 2px solid var(--chrome-light); border-left: 2px solid var(--chrome-light);
        border-bottom: 2px solid #404040; border-right: 2px solid #404040;
        box-shadow: inset -1px -1px 0 var(--chrome-dark), inset 1px 1px 0 #dfdfdf;
      }
      .btn:active {
        border-top-color: #404040; border-left-color: #404040;
        border-bottom-color: var(--chrome-light); border-right-color: var(--chrome-light);
      }
      .btn .key { text-decoration: underline; }
      .statusbar {
        margin: 0 4px 4px; padding: 3px 6px; font-size: 11px;
        border: 1px inset #fff; display: flex; justify-content: space-between;
      }
      .taskbar {
        display: flex; align-items: center; gap: 6px;
        background: var(--chrome); padding: 4px;
        border-top: 2px solid var(--chrome-light);
      }
      .start { display: flex; align-items: center; gap: 6px; padding: 4px 12px 4px 8px; font-weight: 700; font-size: 12px; }
      .start .logo { width: 16px; height: 16px; background: conic-gradient(#f00 0 25%, #0a0 0 50%, #00f 0 75%, #ff0 0); }
      .task { flex: 0 1 220px; padding: 4px 10px; font-size: 12px; border: 1px inset #fff; background: #dfdfdf; }
      .clock { margin-left: auto; padding: 4px 12px; font-size: 12px; border: 1px inset #fff; }
      .stars { color: #000080; font-size: 15px; letter-spacing: 3px; }
    </style>
  </head>
  <body>
    <div class="desktop">
      <div class="window bevel-out">
        <div class="titlebar">
          <span>■</span>
          <span>vibe_check.exe — Campaign “website-theme”</span>
          <span class="spacer"></span>
          <span class="tbtn">_</span><span class="tbtn">□</span><span class="tbtn">✕</span>
        </div>
        <div class="menubar">
          <span><u>F</u>ile</span><span><u>E</u>dit</span><span><u>V</u>iew</span><span><u>H</u>elp</span>
        </div>
        <div class="content">
          <h1>Vibe Check<span class="cursor"></span></h1>
          <p>Welcome! This program collects human feedback on HTML and Markdown candidates and writes the results to your terminal.</p>
          <div class="field">
            <label><input type="checkbox" checked disabled /> Agents generate the candidates</label>
            <label><input type="checkbox" checked disabled /> Humans pass, keep, or love them</label>
            <label><input type="checkbox" checked disabled /> The CLI prints the ranked summary</label>
          </div>
          <p style="margin-top:14px;">Rate this direction: <span class="stars">★★★★★</span></p>
          <div class="row">
            <button class="btn" type="button">★ <span class="key">S</span>tar on GitHub</button>
            <button class="btn" type="button">C:\&gt; npm i -g vibe-check</button>
          </div>
        </div>
        <div class="statusbar"><span>5 objects</span><span>Ready</span></div>
      </div>
    </div>
    <div class="taskbar">
      <span class="start bevel-out"><span class="logo"></span>Start</span>
      <span class="task">■ vibe_check.exe</span>
      <span class="clock">4:20 PM</span>
    </div>
  </body>
</html>
