<header style="--deep:#062d4d; --ocean:#0b6f95; --cyan:#78f2ef; --foam:#e6fbf7; --glass:rgba(209,246,246,0.17); --edge:rgba(221,255,252,0.48); box-sizing:border-box; position:relative; min-height:435px; display:flex; align-items:center; justify-content:center; padding:20px 24px; background:radial-gradient(circle at 10% 12%, #157aa0 0 8%, transparent 30%), radial-gradient(circle at 86% 82%, #17a5af 0 8%, transparent 31%), linear-gradient(135deg, var(--deep), var(--ocean)); color:var(--foam); font-family:'Trebuchet MS', Arial, sans-serif;">
  <div aria-hidden="true" style="position:absolute; top:30px; left:42px; width:170px; height:110px; border:1px solid var(--edge); border-radius:18px; background:var(--glass); box-shadow:0 14px 34px rgba(0,22,44,0.22); backdrop-filter:blur(8px);"></div>
  <div aria-hidden="true" style="position:absolute; right:30px; bottom:24px; width:196px; height:132px; border:1px solid var(--edge); border-radius:26px; background:var(--glass); box-shadow:0 14px 34px rgba(0,22,44,0.25); backdrop-filter:blur(10px);"></div>
  <div aria-hidden="true" style="position:absolute; right:74px; top:38px; width:76px; height:76px; border:1px solid var(--cyan); border-radius:50%; opacity:0.7;"></div>
  <section aria-label="Glass ocean specimen" style="box-sizing:border-box; position:relative; z-index:1; width:min(100%, 600px); padding:18px 24px; border:1px solid var(--edge); border-radius:16px; background:var(--glass); box-shadow:0 16px 40px rgba(0,22,44,0.3), inset 0 1px 0 rgba(255,255,255,0.2); backdrop-filter:blur(16px);">
    <p style="margin:0 0 12px; color:var(--cyan); font-size:10px; font-weight:700; letter-spacing:0.18em; line-height:1.2;">VIBE CHECK — THEME STUDY</p>
    <p style="margin:0 0 6px; color:var(--foam); font-size:12px; font-weight:700; letter-spacing:0.12em; line-height:1.2;">DIGITAL SYSTEMS</p>
    <h1 style="max-width:480px; margin:0; font-size:clamp(34px, 4vw, 48px); font-weight:400; letter-spacing:-0.06em; line-height:0.98;">Make the complex feel clear.</h1>
    <p style="max-width:500px; margin:12px 0 14px; color:var(--foam); font-size:14px; line-height:1.4;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
    <div aria-label="Specimen categories" style="display:flex; min-height:36px; margin:0 0 14px; border:1px solid var(--edge); border-radius:10px; background:rgba(0,30,57,0.24);">
      <span style="flex:1; display:flex; align-items:center; justify-content:center; border-right:1px solid var(--edge); color:var(--cyan); font-size:9px; font-weight:700; letter-spacing:0.1em;">STRATEGY</span>
      <span style="flex:1; display:flex; align-items:center; justify-content:center; border-right:1px solid var(--edge); color:var(--cyan); font-size:9px; font-weight:700; letter-spacing:0.1em;">DESIGN</span>
      <span style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--cyan); font-size:9px; font-weight:700; letter-spacing:0.1em;">TECHNOLOGY</span>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
      <button type="button" style="min-height:36px; padding:0 16px; border:1px solid var(--cyan); border-radius:999px; background:var(--cyan); color:var(--deep); box-shadow:inset 0 1px 0 rgba(255,255,255,0.6); font:700 11px/1 'Trebuchet MS', Arial, sans-serif;">Explore work</button>
      <button type="button" style="min-height:36px; padding:0 16px; border:1px solid var(--edge); border-radius:999px; background:rgba(1,41,69,0.28); color:var(--foam); font:700 11px/1 'Trebuchet MS', Arial, sans-serif;">Start a project</button>
    </div>
  </section>
</header>
