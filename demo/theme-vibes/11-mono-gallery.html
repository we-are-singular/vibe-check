<header style="--paper:#f7f7f3; --ink:#151515; --mist:#d8d8d3; --frame:#292929; box-sizing:border-box; position:relative; min-height:435px; display:flex; align-items:center; justify-content:center; padding:20px 24px; background:var(--paper); color:var(--ink); font-family:Arial, Helvetica, sans-serif;">
  <div aria-hidden="true" style="position:absolute; top:22px; left:28px; width:104px; height:138px; border:8px solid var(--ink); box-sizing:border-box; background:linear-gradient(135deg, var(--mist) 0 48%, var(--paper) 48% 100%); box-shadow:10px 10px 0 var(--mist);"></div>
  <div aria-hidden="true" style="position:absolute; right:34px; bottom:26px; width:144px; height:86px; border:6px solid var(--ink); box-sizing:border-box; background:linear-gradient(90deg, var(--ink) 0 35%, var(--mist) 35% 62%, var(--paper) 62% 100%);"></div>
  <div aria-hidden="true" style="position:absolute; top:38px; right:44px; width:58px; height:2px; background:var(--ink); box-shadow:0 8px 0 var(--ink), 0 16px 0 var(--ink);"></div>
  <section aria-label="Mono gallery specimen" style="box-sizing:border-box; position:relative; z-index:1; width:min(100%, 600px); padding:18px 22px; border:2px solid var(--ink); background:var(--paper); box-shadow:10px 10px 0 var(--ink);">
    <p style="margin:0 0 12px; font-size:10px; font-weight:700; letter-spacing:0.18em; line-height:1.2;">VIBE CHECK — THEME STUDY</p>
    <p style="margin:0 0 6px; font-size:12px; font-weight:700; letter-spacing:0.08em; line-height:1.2;">DIGITAL SYSTEMS</p>
    <h1 style="max-width:500px; margin:0; font-size:clamp(34px, 4vw, 50px); font-weight:900; letter-spacing:-0.075em; line-height:0.9;">Make the complex feel clear.</h1>
    <p style="max-width:480px; margin:14px 0 16px; font-size:14px; line-height:1.4;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
    <div aria-label="Specimen categories" style="display:flex; min-height:36px; margin:0 0 14px; border-top:2px solid var(--ink); border-bottom:2px solid var(--ink);">
      <span style="flex:1; display:flex; align-items:center; padding:0 8px; border-right:2px solid var(--ink); font-size:10px; font-weight:700; letter-spacing:0.1em;">STRATEGY</span>
      <span style="flex:1; display:flex; align-items:center; padding:0 8px; border-right:2px solid var(--ink); background:var(--ink); color:var(--paper); font-size:10px; font-weight:700; letter-spacing:0.1em;">DESIGN</span>
      <span style="flex:1; display:flex; align-items:center; padding:0 8px; font-size:10px; font-weight:700; letter-spacing:0.1em;">TECHNOLOGY</span>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center;">
      <button type="button" style="min-height:36px; padding:0 15px; border:2px solid var(--ink); border-radius:0; background:var(--ink); color:var(--paper); font:700 11px/1 Arial, Helvetica, sans-serif; letter-spacing:0.03em;">Explore work</button>
      <button type="button" style="min-height:36px; padding:0 15px; border:2px solid var(--ink); border-radius:0; background:var(--paper); color:var(--ink); font:700 11px/1 Arial, Helvetica, sans-serif; letter-spacing:0.03em;">Start a project</button>
    </div>
  </section>
</header>
