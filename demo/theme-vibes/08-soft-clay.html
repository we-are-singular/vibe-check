<header style="--clay:#b86f57;--blush:#e9b9a6;--sand:#f2e6dc;--warm:#665851;--light:#fff7ef;--shadow:#9d5e4b; position:relative; box-sizing:border-box; min-height:410px; padding:18px 24px; background:linear-gradient(132deg,var(--sand) 0%,var(--blush) 100%); color:var(--warm); font-family:Georgia,'Times New Roman',serif;">
  <div aria-hidden="true" style="position:absolute; top:16px; right:7%; width:128px; height:128px; border-radius:46% 54% 60% 40%; background:var(--clay); box-shadow:inset 8px 9px 16px rgba(102,88,81,.16),-6px -6px 14px rgba(255,247,239,.48);"></div>
  <div aria-hidden="true" style="position:absolute; bottom:16px; left:0; width:128px; height:78px; border-radius:52% 48% 0 0; background:var(--light); opacity:.82;"></div>
  <div style="position:relative; box-sizing:border-box; width:min(100%,646px); margin:14px auto 0; padding:16px 24px 18px; border:1px solid rgba(102,88,81,.2); border-radius:26px 15px 26px 15px; background:rgba(255,247,239,.62); box-shadow:9px 10px 20px rgba(102,88,81,.17),-6px -6px 14px rgba(255,247,239,.6);">
    <p style="margin:0 0 9px; color:var(--clay); font-family:Arial,sans-serif; font-size:10px; font-weight:700; letter-spacing:1.8px; line-height:1.2;">VIBE CHECK — THEME STUDY</p>
    <p style="margin:0 0 7px; font-family:Arial,sans-serif; font-size:10px; font-weight:700; letter-spacing:1.4px; line-height:1.2;">DIGITAL SYSTEMS</p>
    <h1 style="max-width:510px; margin:0; color:var(--warm); font-size:clamp(35px,5.3vw,51px); font-weight:400; letter-spacing:-2.3px; line-height:.99;">Make the complex feel clear.</h1>
    <p style="max-width:470px; margin:12px 0 14px; font-size:14px; line-height:1.4;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:4px; padding:4px; border-radius:13px; background:rgba(102,88,81,.12); box-shadow:inset 2px 2px 5px rgba(102,88,81,.18),inset -2px -2px 5px rgba(255,247,239,.7); font-family:Arial,sans-serif; font-size:10px; font-weight:700; letter-spacing:1px; line-height:1; text-align:center;">
      <span style="padding:10px 4px; border-radius:9px; background:var(--blush); box-shadow:2px 2px 4px rgba(102,88,81,.14);">STRATEGY</span><span style="padding:10px 4px; border-radius:9px; background:var(--light); box-shadow:2px 2px 4px rgba(102,88,81,.14);">DESIGN</span><span style="padding:10px 4px; border-radius:9px; background:var(--blush); box-shadow:2px 2px 4px rgba(102,88,81,.14);">TECHNOLOGY</span>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:14px;">
      <button type="button" style="padding:10px 16px; border:1px solid var(--clay); border-radius:12px 8px 12px 8px; background:var(--clay); box-shadow:3px 3px 0 var(--shadow); color:var(--light); font:700 12px/1 Arial,sans-serif; cursor:pointer;">Explore work</button>
      <button type="button" style="padding:10px 16px; border:1px solid rgba(102,88,81,.26); border-radius:12px 8px 12px 8px; background:var(--light); box-shadow:3px 3px 0 rgba(102,88,81,.18); color:var(--warm); font:700 12px/1 Arial,sans-serif; cursor:pointer;">Start a project</button>
    </div>
  </div>
</header>
