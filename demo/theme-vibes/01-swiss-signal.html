<header>
  <div style="background:#f4f0e6; color:#121212; min-height:419px; padding:20px 28px; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif;">
    <div aria-hidden="true" style="width:100%; height:8px; background:#e32922; margin:0 0 12px 0;"></div>
    <section aria-label="Swiss signal theme specimen" style="--paper:#f4f0e6; --ink:#121212; --signal:#e32922; --s1:8px; --s2:12px; --s3:16px; --s4:20px; --s5:24px; max-width:1120px; margin:0 auto; border-top:2px solid var(--ink); border-bottom:2px solid var(--ink); display:grid; grid-template-columns:minmax(0, 3fr) minmax(136px, 1fr); gap:var(--s3); padding:var(--s3) 0; box-sizing:border-box;">
      <div style="min-width:0;">
        <p style="margin:0 0 var(--s5) 0; color:var(--signal); font-size:10px; font-weight:700; letter-spacing:0.16em; line-height:1.2;">VIBE CHECK — THEME STUDY</p>
        <p style="margin:0 0 var(--s1) 0; font-size:12px; font-weight:700; letter-spacing:0.08em; line-height:1.2;">DIGITAL SYSTEMS</p>
        <h1 style="margin:0 0 var(--s3) 0; max-width:800px; font-size:clamp(42px, 4.6vw, 60px); font-weight:700; letter-spacing:-0.075em; line-height:0.9;">Make the complex feel clear.</h1>
        <p style="margin:0 0 var(--s4) 0; max-width:620px; font-size:15px; line-height:1.35;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
        <div aria-label="Specimen categories" style="display:grid; grid-template-columns:repeat(3, 1fr); border-top:6px solid var(--signal); border-bottom:1px solid var(--ink); font-size:10px; font-weight:700; letter-spacing:0.1em; line-height:1.2;">
          <span style="padding:10px var(--s1); border-right:1px solid var(--ink);">STRATEGY</span>
          <span style="padding:10px var(--s1); border-right:1px solid var(--ink);">DESIGN</span>
          <span style="padding:10px var(--s1);">TECHNOLOGY</span>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:var(--s2); margin-top:var(--s3);">
          <button type="button" style="appearance:none; border:0; border-radius:0; background:var(--signal); color:var(--paper); padding:11px 16px; font:700 12px/1 Arial, Helvetica, sans-serif; letter-spacing:0.06em; cursor:pointer;">Explore work</button>
          <button type="button" style="appearance:none; border:1px solid var(--ink); border-radius:0; background:transparent; color:var(--ink); padding:10px 15px; font:700 12px/1 Arial, Helvetica, sans-serif; letter-spacing:0.06em; cursor:pointer;">Start a project</button>
        </div>
      </div>
      <div aria-hidden="true" style="align-self:stretch; background:var(--signal); min-height:132px;"></div>
    </section>
  </div>
</header>
