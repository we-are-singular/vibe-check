<header style="--night:#151523; --silver:#c9ced6; --chrome:#f0f2f3; --hot:#ff4d6d; --gold:#ffad55; --sunset:linear-gradient(105deg, var(--hot), var(--gold)); box-sizing:border-box; position:relative; min-height:435px; display:flex; align-items:center; justify-content:center; padding:20px 24px; background:linear-gradient(140deg, var(--night) 0 44%, #59616d 44% 46%, var(--night) 46% 100%); color:var(--night); font-family:'Arial Black', Arial, sans-serif;">
  <div aria-hidden="true" style="position:absolute; top:26px; left:28px; width:190px; height:70px; border:1px solid var(--silver); border-radius:38px; background:linear-gradient(180deg, rgba(240,242,243,0.82), rgba(110,120,132,0.15)); opacity:0.8;"></div>
  <div aria-hidden="true" style="position:absolute; right:38px; bottom:22px; width:152px; height:152px; border:14px solid var(--silver); border-radius:50%; box-sizing:border-box; box-shadow:inset 0 0 0 3px var(--night), 0 0 0 3px var(--hot); opacity:0.92;"></div>
  <div aria-hidden="true" style="position:absolute; top:44px; right:58px; width:98px; height:3px; background:var(--sunset); box-shadow:0 10px 0 var(--silver), 0 20px 0 var(--sunset);"></div>
  <section aria-label="Sunset chrome specimen" style="box-sizing:border-box; position:relative; z-index:1; width:min(100%, 600px); padding:4px; background:var(--sunset); box-shadow:10px 10px 0 rgba(0,0,0,0.28);">
    <div style="box-sizing:border-box; padding:18px 22px 20px; border:1px solid var(--silver); background:linear-gradient(112deg, var(--chrome) 0 9%, #aab1ba 22%, var(--chrome) 37%, #959da8 52%, var(--chrome) 72%, #bac1c9 100%);">
      <p style="margin:0 0 12px; color:var(--night); font-family:Arial, Helvetica, sans-serif; font-size:10px; font-weight:800; letter-spacing:0.18em; line-height:1.2;">VIBE CHECK — THEME STUDY</p>
      <p style="margin:0 0 4px; color:var(--hot); font-size:12px; font-weight:900; letter-spacing:0.08em; line-height:1.2;">DIGITAL SYSTEMS</p>
      <h1 style="max-width:510px; margin:0; font-size:clamp(34px, 4vw, 50px); font-weight:900; letter-spacing:-0.08em; line-height:0.84; text-transform:uppercase;">Make the complex feel clear.</h1>
      <p style="max-width:500px; margin:14px 0; color:var(--night); font-family:Arial, Helvetica, sans-serif; font-size:14px; font-weight:700; line-height:1.4;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
      <div aria-label="Specimen categories" style="display:flex; min-height:36px; margin:0 0 14px; border:2px solid var(--night); background:var(--night);">
        <span style="flex:1; display:flex; align-items:center; justify-content:center; background:var(--chrome); font-size:9px; font-weight:900; letter-spacing:0.08em;">STRATEGY</span>
        <span style="flex:1; display:flex; align-items:center; justify-content:center; border-left:2px solid var(--night); border-right:2px solid var(--night); background:var(--sunset); font-size:9px; font-weight:900; letter-spacing:0.08em;">DESIGN</span>
        <span style="flex:1; display:flex; align-items:center; justify-content:center; background:var(--chrome); font-size:9px; font-weight:900; letter-spacing:0.08em;">TECHNOLOGY</span>
      </div>
      <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center; font-family:Arial, Helvetica, sans-serif;">
        <button type="button" style="min-height:36px; padding:0 15px; border:2px solid var(--night); border-radius:0; background:var(--night); color:var(--chrome); box-shadow:3px 3px 0 var(--hot); font:800 11px/1 Arial, Helvetica, sans-serif;">Explore work</button>
        <button type="button" style="min-height:36px; padding:0 15px; border:2px solid var(--night); border-radius:0; background:var(--chrome); color:var(--night); font:800 11px/1 Arial, Helvetica, sans-serif;">Start a project</button>
      </div>
    </div>
  </section>
</header>
