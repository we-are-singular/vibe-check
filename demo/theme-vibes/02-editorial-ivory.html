<header>
  <div style="background:#f6efe1; color:#211b1a; min-height:419px; padding:16px 24px; box-sizing:border-box; font-family:Georgia, 'Times New Roman', serif;">
    <div aria-hidden="true" style="max-width:860px; height:1px; background:#7b2632; margin:0 auto 10px auto;"></div>
    <section aria-label="Editorial ivory theme specimen" style="--ivory:#f6efe1; --ink:#211b1a; --oxblood:#7b2632; --s1:8px; --s2:12px; --s3:16px; --s4:20px; --s5:24px; max-width:820px; margin:0 auto; border-left:1px solid #cdbda9; border-right:1px solid #cdbda9; padding:8px 24px 16px 24px; box-sizing:border-box; text-align:left;">
      <p style="margin:0 0 var(--s3) 0; color:var(--oxblood); font-family:Arial, Helvetica, sans-serif; font-size:10px; font-weight:700; letter-spacing:0.18em; line-height:1.2; text-align:center;">VIBE CHECK — THEME STUDY</p>
      <p style="margin:0 0 var(--s2) 0; border-top:1px solid #cdbda9; border-bottom:1px solid #cdbda9; padding:6px 0; color:var(--oxblood); font-size:12px; font-variant:small-caps; letter-spacing:0.1em; line-height:1.2; text-align:center;">DIGITAL SYSTEMS</p>
      <h1 style="margin:var(--s3) 0 var(--s2) 0; font-size:clamp(38px, 4.4vw, 54px); font-weight:400; letter-spacing:-0.055em; line-height:0.92; text-align:center;">Make the complex feel clear.</h1>
      <p style="margin:0 auto var(--s4) auto; max-width:600px; font-size:14px; line-height:1.4; text-align:center;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
      <div aria-label="Specimen categories" style="display:grid; grid-template-columns:repeat(3, 1fr); border-top:1px solid var(--ink); border-bottom:1px solid var(--ink); color:var(--oxblood); font-family:Arial, Helvetica, sans-serif; font-size:10px; font-weight:700; letter-spacing:0.13em; line-height:1.2; text-align:center;">
        <span style="padding:9px 4px; border-right:1px solid #cdbda9;">STRATEGY</span>
        <span style="padding:9px 4px; border-right:1px solid #cdbda9;">DESIGN</span>
        <span style="padding:9px 4px;">TECHNOLOGY</span>
      </div>
      <div style="display:flex; justify-content:center; flex-wrap:wrap; gap:var(--s3); margin-top:var(--s3);">
        <button type="button" style="appearance:none; border:0; border-bottom:1px solid var(--oxblood); border-radius:0; background:transparent; color:var(--oxblood); padding:3px 0 5px 0; font:700 11px/1.2 Arial, Helvetica, sans-serif; letter-spacing:0.08em; cursor:pointer;">Explore work</button>
        <button type="button" style="appearance:none; border:1px solid var(--oxblood); border-radius:0; background:var(--oxblood); color:var(--ivory); padding:8px 12px; font:700 11px/1 Arial, Helvetica, sans-serif; letter-spacing:0.08em; cursor:pointer;">Start a project</button>
      </div>
    </section>
    <div aria-hidden="true" style="max-width:860px; height:1px; background:#7b2632; margin:10px auto 0 auto;"></div>
  </div>
</header>
