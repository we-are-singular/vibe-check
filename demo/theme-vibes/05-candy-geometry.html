<header>
  <div style="background:#83d7ff; color:#23194a; min-height:419px; padding:16px 28px; box-sizing:border-box; font-family:'Trebuchet MS', Arial, sans-serif;">
    <div aria-hidden="true" style="width:48px; height:48px; border-radius:50%; background:#ff6e9b; margin:0 0 -12px auto;"></div>
    <section aria-label="Candy geometry theme specimen" style="--sky:#83d7ff; --cream:#fff3bd; --plum:#23194a; --pink:#ff6e9b; --orange:#ff9f45; --mint:#86e3b5; --s1:8px; --s2:12px; --s3:16px; --s4:20px; --s5:24px; max-width:960px; margin:0 auto; background:var(--cream); border:3px solid var(--plum); border-radius:24px 8px 24px 8px; box-shadow:8px 8px 0 var(--plum); padding:20px; box-sizing:border-box;">
      <p style="margin:0 0 var(--s3) 0; display:inline-block; background:var(--pink); border:2px solid var(--plum); border-radius:999px; padding:5px 10px; color:var(--plum); font-size:9px; font-weight:800; letter-spacing:0.1em; line-height:1.2;">VIBE CHECK — THEME STUDY</p>
      <p style="margin:0 0 var(--s1) 0; color:var(--plum); font-size:12px; font-weight:800; letter-spacing:0.08em; line-height:1.2;">DIGITAL SYSTEMS</p>
      <h1 style="margin:0 0 var(--s2) 0; max-width:840px; color:var(--plum); font-size:clamp(42px, 4.6vw, 56px); font-weight:900; letter-spacing:-0.08em; line-height:0.88;">Make the complex feel clear.</h1>
      <p style="margin:0 0 var(--s3) 0; max-width:650px; font-size:14px; font-weight:700; line-height:1.3;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
      <div aria-label="Specimen categories" style="display:grid; grid-template-columns:repeat(3, 1fr); border:2px solid var(--plum); border-radius:12px; color:var(--plum); font-size:10px; font-weight:900; letter-spacing:0.04em; line-height:1.2; text-align:center;">
        <span style="background:var(--pink); padding:10px 6px; border-right:2px solid var(--plum);">STRATEGY</span>
        <span style="background:var(--orange); padding:10px 6px; border-right:2px solid var(--plum);">DESIGN</span>
        <span style="background:var(--mint); padding:10px 6px;">TECHNOLOGY</span>
      </div>
      <div style="display:flex; flex-wrap:wrap; gap:var(--s2); margin-top:var(--s3);">
        <button type="button" style="appearance:none; border:2px solid var(--plum); border-radius:999px; background:var(--plum); color:var(--cream); box-shadow:3px 3px 0 var(--pink); padding:10px 15px; font:900 12px/1 'Trebuchet MS', Arial, sans-serif; cursor:pointer;">Explore work</button>
        <button type="button" style="appearance:none; border:2px solid var(--plum); border-radius:999px; background:var(--mint); color:var(--plum); box-shadow:3px 3px 0 var(--plum); padding:10px 15px; font:900 12px/1 'Trebuchet MS', Arial, sans-serif; cursor:pointer;">Start a project</button>
      </div>
    </section>
    <div aria-hidden="true" style="width:28px; height:28px; border:3px solid #23194a; border-radius:8px; background:#ff9f45; margin:6px auto 0 8%;"></div>
  </div>
</header>
