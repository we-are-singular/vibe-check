<header style="--ice:#edf3f4;--field:#f8fbfb;--surface:rgba(248,251,251,.92);--slate:#314554;--muted:#71838d;--blue:#3d6ea1;--rule:#c6d3d8;--pale-blue:#dce9ef;position:relative;box-sizing:border-box;min-height:100%;padding:18px 28px;background-color:var(--ice);background-image:linear-gradient(var(--rule) 1px,transparent 1px),linear-gradient(90deg,var(--rule) 1px,transparent 1px);background-size:40px 40px;color:var(--slate);font-family:ui-sans-serif,system-ui,sans-serif;font-variant-numeric:tabular-nums;">
  <div aria-hidden="true" style="position:absolute;top:0;bottom:0;left:11%;width:1px;background:var(--blue);opacity:.72;"></div>
  <div aria-hidden="true" style="position:absolute;top:42px;left:calc(11% - 26px);color:var(--blue);font-size:9px;font-weight:700;letter-spacing:1px;writing-mode:vertical-rl;">01 / 04</div>
  <div aria-hidden="true" style="position:absolute;top:34px;right:34px;display:grid;grid-template-columns:repeat(4,8px);gap:3px;opacity:.72;"><i style="width:8px;height:8px;background:var(--blue);"></i><i style="width:8px;height:8px;border:1px solid var(--blue);"></i><i style="width:8px;height:8px;border:1px solid var(--blue);"></i><i style="width:8px;height:8px;background:var(--blue);"></i><i style="width:8px;height:8px;border:1px solid var(--blue);"></i><i style="width:8px;height:8px;background:var(--blue);"></i><i style="width:8px;height:8px;border:1px solid var(--blue);"></i><i style="width:8px;height:8px;border:1px solid var(--blue);"></i></div>
  <section style="position:relative;z-index:1;box-sizing:border-box;width:min(670px,89%);margin:16px 4% 0 auto;padding:18px 24px 17px;border:1px solid var(--rule);background:var(--surface);box-shadow:0 1px 0 var(--field),8px 8px 0 var(--pale-blue);">
    <p style="margin:0 0 12px;color:var(--blue);font-size:9px;font-weight:700;letter-spacing:1.25px;">VIBE CHECK — THEME STUDY</p>
    <p style="margin:0 0 7px;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:2px;">DIGITAL SYSTEMS</p>
    <h1 style="max-width:520px;margin:0;color:var(--slate);font-size:clamp(32px,4.3vw,48px);font-weight:430;line-height:.98;letter-spacing:-1.8px;">Make the complex feel clear.</h1>
    <p style="max-width:480px;margin:11px 0 16px;color:var(--slate);font-size:13px;line-height:1.4;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
    <div aria-label="Disciplines" style="display:grid;grid-template-columns:1.1fr .9fr 1.2fr;border-top:2px solid var(--blue);border-bottom:1px solid var(--rule);">
      <span style="padding:8px 7px 7px 0;border-right:1px solid var(--rule);color:var(--slate);font-size:9px;font-weight:750;letter-spacing:.65px;">STRATEGY</span><span style="padding:8px 7px 7px;border-right:1px solid var(--rule);color:var(--slate);font-size:9px;font-weight:750;letter-spacing:.65px;">DESIGN</span><span style="padding:8px 0 7px 7px;color:var(--slate);font-size:9px;font-weight:750;letter-spacing:.65px;">TECHNOLOGY</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;">
      <button type="button" style="appearance:none;padding:0 0 5px;border:0;border-bottom:2px solid var(--blue);border-radius:0;background:transparent;color:var(--slate);font:700 11px ui-sans-serif,system-ui,sans-serif;letter-spacing:.1px;cursor:pointer;">Explore work</button>
      <button type="button" style="appearance:none;padding:0 0 5px;border:0;border-bottom:1px solid var(--slate);border-radius:0;background:transparent;color:var(--slate);font:700 11px ui-sans-serif,system-ui,sans-serif;letter-spacing:.1px;cursor:pointer;">Start a project</button>
    </div>
  </section>
</header>
