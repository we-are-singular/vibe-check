<header style="--lime:#d9ff36; --mandarin:#ff6b20; --ink:#1b1915; --cream:#fff5d6; box-sizing:border-box; position:relative; min-height:435px; display:flex; align-items:center; padding:20px 24px; background:var(--lime); color:var(--ink); font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;">
  <div aria-hidden="true" style="position:absolute; top:18px; right:28px; width:170px; height:170px; border:14px solid var(--ink); border-radius:50%; background:var(--mandarin);"></div>
  <div aria-hidden="true" style="position:absolute; bottom:22px; left:34px; width:58px; height:58px; border-radius:50%; background:var(--cream); box-shadow:72px 18px 0 var(--mandarin), 144px -8px 0 var(--ink);"></div>
  <div aria-hidden="true" style="position:absolute; top:26px; left:30px; width:76px; height:10px; background:var(--ink);"></div>
  <section aria-label="Citrus poster specimen" style="box-sizing:border-box; position:relative; z-index:1; width:min(100%, 670px); margin:0 auto; padding:18px 22px 20px; border:3px solid var(--ink); background:var(--cream); box-shadow:10px 10px 0 var(--mandarin);">
    <p style="margin:0 0 10px; font-family:Arial, Helvetica, sans-serif; font-size:10px; font-weight:800; letter-spacing:0.16em; line-height:1.2;">VIBE CHECK — THEME STUDY</p>
    <p style="margin:0 0 3px; font-size:12px; letter-spacing:0.06em; line-height:1;">DIGITAL SYSTEMS</p>
    <h1 style="max-width:610px; margin:0; font-size:clamp(42px, 5vw, 60px); font-weight:400; letter-spacing:-0.045em; line-height:0.84; text-transform:uppercase;">Make the complex feel clear.</h1>
    <p style="max-width:500px; margin:12px 0 14px; font-family:Arial, Helvetica, sans-serif; font-size:14px; font-weight:700; line-height:1.35;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
    <div aria-label="Specimen categories" style="display:grid; grid-template-columns:1fr 1fr 1fr; min-height:36px; margin:0 0 14px; border:3px solid var(--ink); background:var(--ink);">
      <span style="display:flex; align-items:center; justify-content:center; background:var(--lime); font-size:11px; letter-spacing:0.04em;">STRATEGY</span>
      <span style="display:flex; align-items:center; justify-content:center; border-left:3px solid var(--ink); border-right:3px solid var(--ink); background:var(--mandarin); font-size:11px; letter-spacing:0.04em;">DESIGN</span>
      <span style="display:flex; align-items:center; justify-content:center; background:var(--cream); font-size:11px; letter-spacing:0.04em;">TECHNOLOGY</span>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center; font-family:Arial, Helvetica, sans-serif;">
      <button type="button" style="min-height:36px; padding:0 16px; border:2px solid var(--ink); border-radius:999px; background:var(--ink); color:var(--cream); font:800 11px/1 Arial, Helvetica, sans-serif;">Explore work</button>
      <button type="button" style="min-height:36px; padding:0 16px; border:2px solid var(--ink); border-radius:999px; background:var(--mandarin); color:var(--ink); font:800 11px/1 Arial, Helvetica, sans-serif;">Start a project</button>
    </div>
  </section>
</header>
