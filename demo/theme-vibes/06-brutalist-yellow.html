<header style="--yellow:#f5d20a;--ink:#11110f;--paper:#fffdf1;--edge:4px;--s:8px; position:relative; box-sizing:border-box; min-height:410px; padding:18px 24px; background:var(--yellow); color:var(--ink); font-family:'Arial Narrow','Roboto Condensed',Arial,sans-serif;">
  <div aria-hidden="true" style="position:absolute; top:0; right:0; width:31%; height:100%; background:var(--ink);"></div>
  <div aria-hidden="true" style="position:absolute; top:18px; right:24px; width:68px; height:68px; background:var(--yellow); border:var(--edge) solid var(--ink);"></div>
  <div aria-hidden="true" style="position:absolute; right:0; bottom:36px; width:32%; height:16px; background:var(--paper);"></div>
  <div style="position:relative; box-sizing:border-box; width:min(100%,640px); margin:16px auto 0; padding:18px 22px 20px; background:var(--paper); border:var(--edge) solid var(--ink); box-shadow:8px 8px 0 var(--ink);">
    <p style="margin:0 0 8px; font-size:10px; font-weight:800; letter-spacing:1.7px; line-height:1.1;">VIBE CHECK — THEME STUDY</p>
    <p style="display:inline-block; margin:0 0 8px; padding:4px 6px 3px; background:var(--yellow); border:2px solid var(--ink); font-size:11px; font-weight:900; letter-spacing:1.3px; line-height:1;">DIGITAL SYSTEMS</p>
    <h1 style="max-width:540px; margin:0; font-size:clamp(36px,5.5vw,52px); font-weight:900; letter-spacing:-3px; line-height:.9;">Make the complex feel clear.</h1>
    <p style="max-width:475px; margin:12px 0 14px; font-family:Arial,sans-serif; font-size:14px; font-weight:700; line-height:1.35;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
    <div style="display:grid; grid-template-columns:repeat(3,1fr); border:3px solid var(--ink); background:var(--ink); gap:3px; font-size:11px; font-weight:900; letter-spacing:.9px; line-height:1; text-align:center;">
      <span style="padding:10px 5px; background:var(--yellow);">STRATEGY</span><span style="padding:10px 5px; background:var(--paper);">DESIGN</span><span style="padding:10px 5px; background:var(--yellow);">TECHNOLOGY</span>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:14px;">
      <button type="button" style="padding:10px 14px; border:3px solid var(--ink); background:var(--ink); color:var(--paper); font:900 12px/1 'Arial Narrow',Arial,sans-serif; letter-spacing:.6px; cursor:pointer;">Explore work</button>
      <button type="button" style="padding:10px 14px; border:3px solid var(--ink); background:var(--yellow); color:var(--ink); font:900 12px/1 'Arial Narrow',Arial,sans-serif; letter-spacing:.6px; cursor:pointer;">Start a project</button>
    </div>
  </div>
</header>
