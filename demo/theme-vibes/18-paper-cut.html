<header style="--cobalt:#214fa3;--coral:#f36f61;--cream:#f7efd8;--ink:#152442;--sun:#f3bf49;--paper-shadow:#102960;position:relative;box-sizing:border-box;min-height:100%;padding:16px 24px;background:var(--cobalt);color:var(--ink);font-family:'Trebuchet MS',Arial,sans-serif;">
  <div aria-hidden="true" style="position:absolute;top:-78px;left:-46px;width:260px;height:205px;border-radius:48% 52% 51% 49%;background:var(--cream);box-shadow:10px 12px 0 var(--paper-shadow);"></div>
  <div aria-hidden="true" style="position:absolute;right:14px;bottom:14px;width:180px;height:160px;border-radius:56% 44% 38% 62%;background:var(--coral);box-shadow:-10px -8px 0 var(--paper-shadow);"></div>
  <div aria-hidden="true" style="position:absolute;top:82px;right:12%;width:64px;height:64px;border-radius:50% 46% 57% 43%;background:var(--sun);box-shadow:6px 7px 0 var(--paper-shadow);"></div>
  <section style="position:relative;z-index:1;box-sizing:border-box;width:min(630px,100%);margin:14px auto 0;padding:17px 22px 16px;border-radius:18px 42px 20px 38px;background:var(--cream);box-shadow:12px 14px 0 var(--paper-shadow);">
    <p style="margin:0 0 12px;color:var(--cobalt);font-size:9px;font-weight:800;letter-spacing:1.4px;">VIBE CHECK — THEME STUDY</p>
    <p style="margin:0 0 7px;color:var(--coral);font-size:11px;font-weight:900;letter-spacing:1.8px;">DIGITAL SYSTEMS</p>
    <h1 style="max-width:490px;margin:0;color:var(--ink);font-size:clamp(34px,4.2vw,50px);font-weight:800;line-height:.92;letter-spacing:-2px;">Make the complex feel clear.</h1>
    <p style="max-width:485px;margin:12px 0 15px;color:var(--ink);font-size:13px;font-weight:600;line-height:1.35;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
    <div aria-label="Disciplines" style="display:flex;gap:4px;padding:4px;border-radius:14px 22px 14px 22px;background:var(--cobalt);box-shadow:inset 0 0 0 2px var(--ink);">
      <span style="flex:1;padding:7px 5px;border-radius:9px 15px 8px 14px;background:var(--cream);color:var(--ink);font-size:9px;font-weight:900;letter-spacing:.3px;text-align:center;">STRATEGY</span><span style="flex:1;padding:7px 5px;border-radius:14px 8px 15px 9px;background:var(--coral);color:var(--ink);font-size:9px;font-weight:900;letter-spacing:.3px;text-align:center;">DESIGN</span><span style="flex:1;padding:7px 5px;border-radius:8px 15px 9px 14px;background:var(--sun);color:var(--ink);font-size:9px;font-weight:900;letter-spacing:.3px;text-align:center;">TECHNOLOGY</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;">
      <button type="button" style="appearance:none;padding:9px 14px;border:0;border-radius:9px 17px 9px 17px;background:var(--coral);box-shadow:3px 3px 0 var(--ink);color:var(--ink);font:800 11px 'Trebuchet MS',Arial,sans-serif;cursor:pointer;">Explore work</button>
      <button type="button" style="appearance:none;padding:8px 13px;border:2px solid var(--ink);border-radius:17px 9px 17px 9px;background:var(--cream);color:var(--ink);font:800 11px 'Trebuchet MS',Arial,sans-serif;cursor:pointer;">Start a project</button>
    </div>
  </section>
</header>
