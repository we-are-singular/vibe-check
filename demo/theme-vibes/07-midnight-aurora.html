<header style="--night:#091126;--night-deep:#050915;--mist:#eef5ff;--muted:#b9c5dc;--violet:#8b63ff;--teal:#38e3c4;--line:rgba(238,245,255,.24); position:relative; box-sizing:border-box; min-height:410px; padding:18px 26px; background:radial-gradient(circle at 16% 12%,rgba(73,70,211,.5),transparent 30%),radial-gradient(circle at 82% 62%,rgba(16,180,181,.35),transparent 27%),linear-gradient(135deg,var(--night),var(--night-deep)); color:var(--mist); font-family:Avenir,'Segoe UI',sans-serif;">
  <div aria-hidden="true" style="position:absolute; top:18px; left:12%; width:150px; height:150px; border-radius:50%; background:var(--violet); filter:blur(52px); opacity:.36;"></div>
  <div aria-hidden="true" style="position:absolute; right:6%; bottom:18px; width:170px; height:150px; border-radius:50%; background:var(--teal); filter:blur(56px); opacity:.26;"></div>
  <div aria-hidden="true" style="position:absolute; inset:0; opacity:.18; background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px); background-size:44px 44px;"></div>
  <div style="position:relative; box-sizing:border-box; width:min(100%,650px); margin:0 auto; padding:10px 2px 12px 20px; border-left:1px solid var(--line);">
    <p style="margin:0 0 12px; color:var(--teal); font-size:10px; font-weight:700; letter-spacing:2.3px; line-height:1.2;">VIBE CHECK — THEME STUDY</p>
    <p style="margin:0 0 7px; color:var(--muted); font-size:11px; font-weight:600; letter-spacing:1.6px; line-height:1.2;">DIGITAL SYSTEMS</p>
    <h1 style="max-width:560px; margin:0; font-size:clamp(36px,5.5vw,52px); font-weight:400; letter-spacing:-2.4px; line-height:.98;">Make the complex feel clear.</h1>
    <p style="max-width:470px; margin:12px 0 16px; color:var(--muted); font-size:14px; font-weight:400; line-height:1.45;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
    <div style="display:flex; align-items:center; border-top:1px solid var(--line); border-bottom:1px solid var(--line); color:var(--mist); font-size:10px; font-weight:700; letter-spacing:1.2px; line-height:1;">
      <span style="flex:1; padding:11px 0;">STRATEGY</span><span style="width:1px; height:18px; background:linear-gradient(var(--violet),var(--teal));"></span><span style="flex:1; padding:11px 0; text-align:center;">DESIGN</span><span style="width:1px; height:18px; background:linear-gradient(var(--teal),var(--violet));"></span><span style="flex:1; padding:11px 0; text-align:right;">TECHNOLOGY</span>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:16px;">
      <button type="button" style="padding:10px 16px; border:1px solid var(--teal); border-radius:999px; background:var(--teal); color:var(--night-deep); font:700 12px/1 Avenir,'Segoe UI',sans-serif; cursor:pointer;">Explore work</button>
      <button type="button" style="padding:10px 16px; border:1px solid var(--line); border-radius:999px; background:rgba(9,17,38,.34); color:var(--mist); font:600 12px/1 Avenir,'Segoe UI',sans-serif; cursor:pointer;">Start a project</button>
    </div>
  </div>
</header>
