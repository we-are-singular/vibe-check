<header style="--paper:#e8dfc9;--paper-light:#f6f0df;--ink:#122640;--faded:#667181;--mark:#9f503f;--rule:rgba(18,38,64,.56); position:relative; box-sizing:border-box; min-height:410px; padding:18px 24px; background-color:var(--paper); background-image:repeating-radial-gradient(circle at 0 0,rgba(18,38,64,.075) 0 1px,transparent 1px 5px),repeating-linear-gradient(0deg,transparent 0 3px,rgba(255,255,255,.16) 3px 4px); color:var(--ink); font-family:Georgia,'Times New Roman',serif;">
  <div aria-hidden="true" style="position:absolute; top:18px; left:7%; width:56px; height:56px; border:1px solid var(--mark); border-radius:50%; opacity:.62;"></div>
  <div aria-hidden="true" style="position:absolute; right:8%; bottom:20px; width:72px; height:1px; background:var(--ink); box-shadow:0 7px 0 var(--ink),0 14px 0 var(--ink); opacity:.35;"></div>
  <div style="position:relative; box-sizing:border-box; width:min(100%,648px); margin:12px auto 0; padding:18px 26px 20px; background:rgba(246,240,223,.82); border:1px solid var(--ink); box-shadow:5px 5px 0 var(--paper),6px 6px 0 var(--ink);">
    <p style="margin:0 0 10px; color:var(--mark); font-size:10px; font-weight:700; letter-spacing:1.9px; line-height:1.2;">VIBE CHECK — THEME STUDY</p>
    <p style="margin:0 0 7px; color:var(--faded); font-size:11px; font-weight:700; letter-spacing:1.3px; line-height:1.2;">DIGITAL SYSTEMS</p>
    <h1 style="max-width:520px; margin:0; font-size:clamp(36px,5.4vw,52px); font-weight:400; letter-spacing:-2.3px; line-height:1;">Make the complex feel clear.</h1>
    <p style="max-width:478px; margin:12px 0 15px; color:var(--faded); font-size:14px; line-height:1.42;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
    <div style="display:grid; grid-template-columns:1fr auto 1fr auto 1fr; align-items:center; border-top:3px double var(--ink); border-bottom:3px double var(--ink); color:var(--ink); font-size:10px; font-weight:700; letter-spacing:1.15px; line-height:1; text-align:center;">
      <span style="padding:10px 5px;">STRATEGY</span><i aria-hidden="true" style="display:block; width:1px; height:16px; background:var(--rule);"></i><span style="padding:10px 5px;">DESIGN</span><i aria-hidden="true" style="display:block; width:1px; height:16px; background:var(--rule);"></i><span style="padding:10px 5px;">TECHNOLOGY</span>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:15px;">
      <button type="button" style="padding:10px 16px; border:1px solid var(--ink); background:var(--ink); box-shadow:2px 2px 0 var(--mark); color:var(--paper-light); font:700 12px/1 Georgia,'Times New Roman',serif; cursor:pointer;">Explore work</button>
      <button type="button" style="padding:10px 16px; border:1px solid var(--ink); background:var(--paper-light); box-shadow:2px 2px 0 var(--ink); color:var(--ink); font:700 12px/1 Georgia,'Times New Roman',serif; cursor:pointer;">Start a project</button>
    </div>
  </div>
</header>
