<header style="--paper:#c9d0cd;--paper-light:#dce1dc;--paper-deep:#b8c2c2;--surface:rgba(220,225,220,.52);--ink:#273740;--faded:#657982;--oxide:#9c5048;--line:rgba(39,55,64,.38);--shadow:rgba(39,55,64,.16);position:relative;box-sizing:border-box;min-height:100%;padding:18px 28px 20px;background:linear-gradient(112deg,var(--paper-light),var(--paper) 52%,var(--paper-deep));color:var(--ink);font-family:ui-monospace,"Courier New",monospace;">
  <div aria-hidden="true" style="position:absolute;top:18px;left:22px;width:13px;height:13px;border-top:1px solid var(--faded);border-left:1px solid var(--faded);"></div>
  <div aria-hidden="true" style="position:absolute;top:18px;right:22px;width:13px;height:13px;border-top:1px solid var(--faded);border-right:1px solid var(--faded);"></div>
  <div aria-hidden="true" style="position:absolute;bottom:18px;left:22px;width:13px;height:13px;border-bottom:1px solid var(--faded);border-left:1px solid var(--faded);"></div>
  <div aria-hidden="true" style="position:absolute;right:22px;bottom:18px;width:13px;height:13px;border-right:1px solid var(--faded);border-bottom:1px solid var(--faded);"></div>
  <div aria-hidden="true" style="position:absolute;top:43px;right:10%;width:60px;height:60px;border:2px solid var(--oxide);border-radius:50%;box-shadow:inset 0 0 0 4px var(--paper);opacity:.72;"></div>
  <div aria-hidden="true" style="position:absolute;top:64px;right:calc(10% + 13px);color:var(--oxide);font-size:9px;letter-spacing:1px;opacity:.82;">FILED</div>
  <section style="position:relative;z-index:1;box-sizing:border-box;width:min(650px,100%);margin:0 auto;padding:18px 24px;border:1px solid var(--line);background:var(--surface);box-shadow:7px 7px 0 var(--shadow);">
    <p style="margin:0 0 11px;color:var(--faded);font-size:10px;font-weight:700;letter-spacing:1.35px;">VIBE CHECK — THEME STUDY</p>
    <p style="margin:0 0 8px;color:var(--oxide);font-size:10px;font-weight:700;letter-spacing:2.2px;">DIGITAL SYSTEMS</p>
    <h1 style="max-width:540px;margin:0;color:var(--ink);font-family:Georgia,serif;font-size:clamp(32px,4.3vw,46px);font-weight:400;line-height:.94;letter-spacing:-1.5px;">Make the complex feel clear.</h1>
    <p style="max-width:505px;margin:12px 0 15px;color:var(--ink);font-family:Georgia,serif;font-size:13px;line-height:1.35;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
    <div aria-label="Disciplines" style="display:flex;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);">
      <span style="flex:1;padding:8px 10px;border-right:1px solid var(--line);font-size:9px;font-weight:700;letter-spacing:1px;">STRATEGY</span><span style="flex:1;padding:8px 10px;border-right:1px solid var(--line);font-size:9px;font-weight:700;letter-spacing:1px;">DESIGN</span><span style="flex:1;padding:8px 10px;font-size:9px;font-weight:700;letter-spacing:1px;">TECHNOLOGY</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:9px;margin-top:15px;">
      <button type="button" style="appearance:none;padding:9px 14px;border:1px solid var(--ink);border-radius:0;background:var(--ink);color:var(--paper-light);font:700 10px ui-monospace,'Courier New',monospace;letter-spacing:.5px;cursor:pointer;">Explore work</button>
      <button type="button" style="appearance:none;padding:9px 14px;border:1px solid var(--ink);border-radius:0;background:transparent;color:var(--ink);font:700 10px ui-monospace,'Courier New',monospace;letter-spacing:.5px;cursor:pointer;">Start a project</button>
    </div>
  </section>
</header>
