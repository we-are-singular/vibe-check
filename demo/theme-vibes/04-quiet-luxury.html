<header>
  <div style="background:#242321; color:#eee6d6; min-height:419px; padding:18px 28px; box-sizing:border-box; font-family:Arial, Helvetica, sans-serif;">
    <div aria-hidden="true" style="max-width:1040px; height:1px; background:#b89b67; margin:0 auto 10px auto; opacity:0.7;"></div>
    <section aria-label="Quiet luxury theme specimen" style="--charcoal:#242321; --champagne:#eee6d6; --gold:#b89b67; --muted:#bfb6a5; --s1:8px; --s2:12px; --s3:16px; --s4:20px; --s5:24px; max-width:960px; margin:0 auto; padding:10px 36px 18px 36px; box-sizing:border-box; border-left:1px solid rgba(184,155,103,0.45); border-right:1px solid rgba(184,155,103,0.45);">
      <p style="margin:0 0 var(--s3) 0; color:var(--gold); font-size:10px; font-weight:700; letter-spacing:0.2em; line-height:1.2; text-align:center;">VIBE CHECK — THEME STUDY</p>
      <p style="margin:0 0 var(--s2) 0; color:var(--muted); font-size:11px; font-weight:700; letter-spacing:0.16em; line-height:1.2; text-align:center;">DIGITAL SYSTEMS</p>
      <h1 style="margin:0 auto var(--s3) auto; max-width:800px; color:var(--champagne); font-family:Georgia, 'Times New Roman', serif; font-size:clamp(40px, 4.6vw, 56px); font-weight:400; letter-spacing:-0.055em; line-height:0.95; text-align:center;">Make the complex feel clear.</h1>
      <p style="margin:0 auto var(--s4) auto; max-width:620px; color:var(--muted); font-size:14px; line-height:1.4; text-align:center;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
      <div aria-label="Specimen categories" style="display:flex; align-items:center; border-top:1px solid rgba(184,155,103,0.65); border-bottom:1px solid rgba(184,155,103,0.65); color:var(--gold); font-size:10px; font-weight:700; letter-spacing:0.15em; line-height:1.2;">
        <span style="flex:1; padding:10px 0;">STRATEGY</span>
        <span aria-hidden="true" style="width:1px; height:16px; background:rgba(184,155,103,0.65);"></span>
        <span style="flex:1; padding:10px 0; text-align:center;">DESIGN</span>
        <span aria-hidden="true" style="width:1px; height:14px; background:rgba(184,155,103,0.65);"></span>
        <span style="flex:1; padding:10px 0; text-align:right;">TECHNOLOGY</span>
      </div>
      <div style="display:flex; justify-content:center; flex-wrap:wrap; gap:var(--s2); margin-top:var(--s3);">
        <button type="button" style="appearance:none; border:1px solid var(--gold); border-radius:0; background:var(--gold); color:var(--charcoal); padding:10px 16px; font:700 10px/1 Arial, Helvetica, sans-serif; letter-spacing:0.12em; cursor:pointer;">Explore work</button>
        <button type="button" style="appearance:none; border:1px solid rgba(238,230,214,0.55); border-radius:0; background:transparent; color:var(--champagne); padding:10px 16px; font:700 10px/1 Arial, Helvetica, sans-serif; letter-spacing:0.12em; cursor:pointer;">Start a project</button>
      </div>
    </section>
    <div aria-hidden="true" style="max-width:1040px; height:1px; background:#b89b67; margin:10px auto 0 auto; opacity:0.7;"></div>
  </div>
</header>
