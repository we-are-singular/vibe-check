<header style="--cream:#f0ead9; --moss:#4c5c36; --deep-moss:#283b2a; --earth:#a7603d; --bark:#4a3425; box-sizing:border-box; position:relative; min-height:435px; display:flex; align-items:center; justify-content:center; padding:20px 24px; background:var(--cream); color:var(--deep-moss); font-family:Georgia, 'Times New Roman', serif;">
  <div aria-hidden="true" style="position:absolute; top:18px; left:38px; width:100px; height:144px; border-radius:100% 0 100% 0; background:var(--moss); opacity:0.22;"></div>
  <div aria-hidden="true" style="position:absolute; right:38px; bottom:18px; width:140px; height:174px; border:2px solid var(--moss); border-radius:100% 0 100% 0; opacity:0.45;"></div>
  <div aria-hidden="true" style="position:absolute; left:52px; bottom:42px; width:96px; height:2px; background:var(--earth); box-shadow:16px -16px 0 var(--earth), 32px -32px 0 var(--earth);"></div>
  <section aria-label="Forest field specimen" style="box-sizing:border-box; position:relative; z-index:1; width:min(100%, 600px); padding:18px 24px 20px; border-left:6px solid var(--moss); border-bottom:1px solid var(--moss); background:rgba(240,234,217,0.9);">
    <p style="margin:0 0 12px; color:var(--earth); font-family:'Courier New', monospace; font-size:10px; font-weight:700; letter-spacing:0.12em; line-height:1.2;">VIBE CHECK — THEME STUDY</p>
    <p style="margin:0 0 6px; color:var(--moss); font-family:'Courier New', monospace; font-size:11px; font-weight:700; letter-spacing:0.16em; line-height:1.2;">DIGITAL SYSTEMS</p>
    <h1 style="max-width:480px; margin:0; font-size:clamp(34px, 4vw, 48px); font-weight:400; letter-spacing:-0.055em; line-height:0.95;">Make the complex feel clear.</h1>
    <p style="max-width:480px; margin:12px 0 14px; color:var(--bark); font-size:14px; line-height:1.4;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
    <div aria-label="Specimen categories" style="display:grid; grid-template-columns:1fr 1fr 1fr; min-height:36px; margin:0 0 14px; border-top:1px solid var(--moss); border-bottom:1px solid var(--moss);">
      <span style="display:flex; align-items:center; padding:0 8px; border-right:1px solid var(--moss); font-family:'Courier New', monospace; font-size:9px; font-weight:700; letter-spacing:0.06em;">STRATEGY</span>
      <span style="display:flex; align-items:center; padding:0 8px; border-right:1px solid var(--moss); background:var(--moss); color:var(--cream); font-family:'Courier New', monospace; font-size:9px; font-weight:700; letter-spacing:0.06em;">DESIGN</span>
      <span style="display:flex; align-items:center; padding:0 8px; font-family:'Courier New', monospace; font-size:9px; font-weight:700; letter-spacing:0.06em;">TECHNOLOGY</span>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:8px; align-items:center; font-family:'Courier New', monospace;">
      <button type="button" style="min-height:36px; padding:0 16px; border:1px solid var(--deep-moss); border-radius:2px; background:var(--deep-moss); color:var(--cream); font:700 10px/1 'Courier New', monospace; letter-spacing:0.02em;">Explore work</button>
      <button type="button" style="min-height:36px; padding:0 16px; border:1px solid var(--earth); border-radius:2px; background:transparent; color:var(--earth); font:700 10px/1 'Courier New', monospace; letter-spacing:0.02em;">Start a project</button>
    </div>
  </section>
</header>
