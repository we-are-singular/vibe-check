<header>
  <div style="background-color:#07100d; background-image:repeating-linear-gradient(0deg, rgba(119,255,151,0.05) 0, rgba(119,255,151,0.05) 1px, transparent 1px, transparent 5px), linear-gradient(90deg, rgba(119,255,151,0.08) 1px, transparent 1px); background-size:auto, 48px 48px; color:#9cffaf; min-height:419px; padding:16px 24px; box-sizing:border-box; font-family:'Courier New', Courier, monospace;">
    <div aria-hidden="true" style="max-width:920px; height:2px; background:#9cffaf; box-shadow:0 0 10px #59ff78; margin:0 auto 10px auto;"></div>
    <section aria-label="Neon terminal theme specimen" style="--void:#07100d; --phosphor:#9cffaf; --bright:#d4ffe0; --line:#2f9850; --s1:8px; --s2:12px; --s3:16px; --s4:20px; --s5:24px; max-width:920px; margin:0 auto; border:1px solid var(--line); box-shadow:0 0 0 3px rgba(46,152,80,0.12), inset 0 0 24px rgba(74,255,112,0.08); padding:16px; box-sizing:border-box;">
      <p style="margin:0 0 var(--s3) 0; color:var(--bright); font-size:10px; font-weight:700; letter-spacing:0.08em; line-height:1.2;">VIBE CHECK — THEME STUDY</p>
      <p style="margin:0 0 var(--s1) 0; color:var(--line); font-size:11px; font-weight:700; letter-spacing:0.13em; line-height:1.2;">DIGITAL SYSTEMS</p>
      <h1 style="margin:0 0 var(--s3) 0; max-width:860px; color:var(--bright); font-size:clamp(34px, 3.6vw, 46px); font-weight:700; letter-spacing:-0.075em; line-height:0.95; text-shadow:0 0 10px rgba(156,255,175,0.5);">Make the complex feel clear.</h1>
      <p style="margin:0 0 var(--s4) 0; max-width:740px; font-size:14px; line-height:1.4;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
      <div aria-label="Specimen categories" style="display:grid; grid-template-columns:repeat(3, 1fr); border:1px solid var(--line); background:rgba(11,34,20,0.82); font-size:10px; font-weight:700; letter-spacing:0.09em; line-height:1.2; text-align:center;">
        <span style="padding:10px 8px; border-right:1px solid var(--line);">STRATEGY</span>
        <span style="padding:10px 8px; border-right:1px solid var(--line);">DESIGN</span>
        <span style="padding:10px 8px;">TECHNOLOGY</span>
      </div>
      <div style="display:flex; flex-wrap:wrap; gap:var(--s2); margin-top:var(--s3);">
        <button type="button" style="appearance:none; border:1px solid var(--phosphor); border-radius:0; background:var(--phosphor); color:var(--void); box-shadow:0 0 10px rgba(156,255,175,0.45); padding:10px 14px; font:700 11px/1 'Courier New', Courier, monospace; letter-spacing:0.05em; cursor:pointer;">Explore work</button>
        <button type="button" style="appearance:none; border:1px solid var(--line); border-radius:0; background:transparent; color:var(--phosphor); padding:10px 14px; font:700 11px/1 'Courier New', Courier, monospace; letter-spacing:0.05em; cursor:pointer;">Start a project</button>
      </div>
    </section>
  </div>
</header>
