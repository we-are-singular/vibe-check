<header style="--ivory:#f7f0e9;--rose:#d89ca3;--blush:#edc9c8;--burgundy:#691f36;--wine:#42202a;--line:#c8838c;position:relative;box-sizing:border-box;min-height:100%;padding:16px 8.5% 18px;background:var(--ivory);color:var(--wine);font-family:Arial,Helvetica,sans-serif;">
  <div aria-hidden="true" style="position:absolute;top:-90px;right:7%;width:215px;height:295px;border:1px solid var(--line);border-radius:50%;background:var(--blush);opacity:.58;"></div>
  <div aria-hidden="true" style="position:absolute;top:18px;left:5%;height:1px;width:18%;background:var(--burgundy);"></div>
  <div aria-hidden="true" style="position:absolute;right:6%;bottom:20px;height:84px;width:1px;background:var(--line);"></div>
  <section style="position:relative;z-index:1;box-sizing:border-box;width:min(635px,100%);margin:0 auto;padding:12px 0;border-top:1px solid var(--burgundy);border-bottom:1px solid var(--line);">
    <p style="margin:0 0 12px;color:var(--burgundy);font-size:9px;font-weight:700;letter-spacing:1.55px;">VIBE CHECK — THEME STUDY</p>
    <p style="margin:0 0 6px;color:var(--rose);font-size:10px;font-weight:700;letter-spacing:2.5px;">DIGITAL SYSTEMS</p>
    <h1 style="max-width:570px;margin:0;color:var(--burgundy);font-family:Didot,'Bodoni MT',Georgia,serif;font-size:clamp(37px,4.6vw,54px);font-weight:400;line-height:.86;letter-spacing:-2.5px;">Make the complex feel clear.</h1>
    <p style="max-width:435px;margin:12px 0 15px;color:var(--wine);font-family:Georgia,serif;font-size:13px;line-height:1.35;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
    <div aria-label="Disciplines" style="display:flex;align-items:center;border-top:1px solid var(--line);border-bottom:1px solid var(--line);">
      <span style="flex:1;padding:8px 0;color:var(--burgundy);font-size:9px;font-weight:700;letter-spacing:1.05px;">STRATEGY</span><span style="flex:1;padding:8px 10px;border-left:1px solid var(--line);border-right:1px solid var(--line);color:var(--burgundy);font-size:9px;font-weight:700;letter-spacing:1.05px;text-align:center;">DESIGN</span><span style="flex:1;padding:8px 0;color:var(--burgundy);font-size:9px;font-weight:700;letter-spacing:1.05px;text-align:right;">TECHNOLOGY</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;align-items:center;gap:15px;margin-top:14px;">
      <button type="button" style="appearance:none;padding:9px 14px;border:1px solid var(--burgundy);border-radius:0;background:var(--burgundy);color:var(--ivory);font:700 10px Arial,Helvetica,sans-serif;letter-spacing:.55px;cursor:pointer;">Explore work</button>
      <button type="button" style="appearance:none;padding:6px 0;border:0;border-bottom:1px solid var(--burgundy);border-radius:0;background:transparent;color:var(--burgundy);font:700 10px Arial,Helvetica,sans-serif;letter-spacing:.55px;cursor:pointer;">Start a project</button>
    </div>
  </section>
</header>
