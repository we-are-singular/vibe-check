<header style="--cobalt:#0947c6;--cobalt-deep:#062c7b;--white:#f8fbff;--mist:#dce9ff;--stripe:#7ca4ff;--ink:#061d53; position:relative; box-sizing:border-box; min-height:410px; padding:18px 24px; background:var(--white); color:var(--cobalt-deep); font-family:Impact,'Arial Black','Franklin Gothic Heavy',sans-serif;">
  <div aria-hidden="true" style="position:absolute; top:0; right:0; width:72%; height:156px; clip-path:polygon(14% 0,100% 0,100% 76%,0 100%); background:linear-gradient(to bottom,var(--cobalt) 0 74%,var(--stripe) 74% 86%,var(--cobalt-deep) 86% 100%);"></div>
  <div aria-hidden="true" style="position:absolute; left:0; bottom:0; width:42%; height:82px; clip-path:polygon(0 23%,100% 0,100% 100%,0 100%); background:var(--mist); border-top:8px solid var(--cobalt);"></div>
  <div style="position:relative; box-sizing:border-box; width:min(100%,650px); margin:20px auto 0; padding:18px 24px 20px; background:var(--cobalt); border-left:8px solid var(--cobalt-deep); color:var(--white); box-shadow:8px 8px 0 var(--cobalt-deep);">
    <p style="margin:0 0 8px; color:var(--mist); font-family:Arial,sans-serif; font-size:10px; font-weight:800; letter-spacing:1.9px; line-height:1.2;">VIBE CHECK — THEME STUDY</p>
    <p style="margin:0 0 7px; font-family:Arial,sans-serif; font-size:10px; font-weight:800; letter-spacing:1.8px; line-height:1.2;">DIGITAL SYSTEMS</p>
    <h1 style="max-width:540px; margin:0; font-size:clamp(37px,5.7vw,54px); font-weight:900; letter-spacing:-1.5px; line-height:.9;">Make the complex feel clear.</h1>
    <p style="max-width:480px; margin:12px 0 14px; color:var(--mist); font-family:Arial,sans-serif; font-size:14px; font-weight:600; line-height:1.4;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
    <div style="display:grid; grid-template-columns:repeat(3,1fr); border:2px solid var(--white); background:var(--white); gap:2px; color:var(--cobalt-deep); font-family:Arial,sans-serif; font-size:10px; font-weight:900; letter-spacing:1.1px; line-height:1; text-align:center;">
      <span style="padding:10px 3px; background:var(--white);">STRATEGY</span><span style="padding:10px 3px; background:var(--mist);">DESIGN</span><span style="padding:10px 3px; background:var(--white);">TECHNOLOGY</span>
    </div>
    <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; font-family:Arial,sans-serif;">
      <button type="button" style="padding:10px 16px; border:2px solid var(--white); background:var(--white); color:var(--cobalt-deep); font:900 11px/1 Arial,sans-serif; letter-spacing:.6px; cursor:pointer;">Explore work</button>
      <button type="button" style="padding:10px 16px; border:2px solid var(--white); background:transparent; color:var(--white); font:900 11px/1 Arial,sans-serif; letter-spacing:.6px; cursor:pointer;">Start a project</button>
    </div>
  </div>
</header>
