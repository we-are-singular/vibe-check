<header style="--void:#111014;--paper:#f2eee5;--volt:#fa16a5;--acid:#d7ff22;--edge:#f2eee5;--texture-scan:rgba(242,238,229,.055);--texture-ink:rgba(250,22,165,.08);position:relative;box-sizing:border-box;min-height:100%;padding:16px;background-color:var(--void);background-image:repeating-linear-gradient(0deg,var(--texture-scan) 0 1px,transparent 1px 5px),repeating-linear-gradient(90deg,transparent 0 13px,var(--texture-ink) 13px 14px);color:var(--paper);font-family:Arial,Helvetica,sans-serif;">
  <div aria-hidden="true" style="position:absolute;top:0;right:0;width:34%;height:100%;background:var(--volt);clip-path:polygon(28% 0,100% 0,100% 100%,0 100%);opacity:.92;"></div>
  <div aria-hidden="true" style="position:absolute;top:20px;right:20px;color:var(--void);font-family:Impact,Arial,sans-serif;font-size:78px;line-height:.75;letter-spacing:-5px;opacity:.9;">╱╱╱</div>
  <div aria-hidden="true" style="position:absolute;bottom:18px;left:20px;width:64px;height:8px;background:var(--acid);box-shadow:74px 0 0 var(--volt),148px 0 0 var(--paper);"></div>
  <section style="position:relative;z-index:1;box-sizing:border-box;width:min(680px,91%);margin:14px 0 12px 5%;padding:14px 18px 16px;border:2px solid var(--edge);background:var(--void);box-shadow:9px 9px 0 var(--volt);">
    <p style="display:inline-block;margin:0 0 10px;padding:4px 6px;background:var(--acid);color:var(--void);font-size:9px;font-weight:900;letter-spacing:1.1px;">VIBE CHECK — THEME STUDY</p>
    <p style="margin:0 0 4px;color:var(--volt);font-family:Impact,'Arial Narrow',sans-serif;font-size:16px;letter-spacing:1.5px;">DIGITAL SYSTEMS</p>
    <h1 style="max-width:550px;margin:0;color:var(--paper);font-family:Impact,'Arial Narrow',sans-serif;font-size:clamp(38px,5vw,54px);font-weight:400;line-height:.8;letter-spacing:-2px;text-transform:uppercase;">Make the complex feel clear.</h1>
    <p style="max-width:490px;margin:12px 0 14px;color:var(--paper);font-size:13px;font-weight:700;line-height:1.3;letter-spacing:.1px;">A compact typography, colour and spacing study for products that need a confident point of view.</p>
    <div aria-label="Disciplines" style="display:grid;grid-template-columns:1.1fr .8fr 1.3fr;border:2px solid var(--paper);">
      <span style="padding:7px;background:var(--paper);color:var(--void);font-size:9px;font-weight:900;letter-spacing:.8px;">STRATEGY</span><span style="padding:7px;border-left:2px solid var(--paper);border-right:2px solid var(--paper);color:var(--volt);font-size:9px;font-weight:900;letter-spacing:.8px;">DESIGN</span><span style="padding:7px;background:var(--volt);color:var(--void);font-size:9px;font-weight:900;letter-spacing:.8px;">TECHNOLOGY</span>
    </div>
    <div style="display:flex;align-items:stretch;gap:0;margin-top:14px;">
      <button type="button" style="appearance:none;padding:10px 14px;border:0;border-right:2px solid var(--void);border-radius:0;background:var(--acid);color:var(--void);font:900 11px Arial,Helvetica,sans-serif;letter-spacing:.3px;cursor:pointer;">Explore work</button>
      <button type="button" style="appearance:none;padding:10px 14px;border:2px solid var(--paper);border-radius:0;background:var(--void);color:var(--paper);font:900 11px Arial,Helvetica,sans-serif;letter-spacing:.3px;cursor:pointer;">Start a project</button>
    </div>
  </section>
</header>
