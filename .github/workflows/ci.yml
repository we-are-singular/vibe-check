name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Lint, Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # setup-node provides Node; npm is pinned separately by packageManager.
      - name: Set up npm
        run: npm install --global npm@11.18.0

      - name: Confirm npm version
        run: npm --version | grep -Fx 11.18.0

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
